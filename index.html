<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>Sales Live Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#f0f2f7}
body{font-family:'Inter',sans-serif;color:#111827}

/* ── APP GRID ── */
#app{
  height:100vh;
  display:grid;
  grid-template-rows:64px 3px auto 1fr 32px;
  background:#f0f2f7;
}

/* ── HEADER ── */
#header{
  background:#fff;
  border-bottom:1px solid #e5e7eb;
  padding:0 24px;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
}
#header-left{display:flex;align-items:center;gap:10px}
#logo-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#3b6ef8,#7c3aed);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;box-shadow:0 2px 10px rgba(99,102,241,.35);flex-shrink:0;
}
#app-name{font-size:17px;font-weight:800;color:#111827;letter-spacing:-.03em}
#app-sub{font-size:10px;color:#9ca3af;font-weight:500;margin-left:2px}

/* countdown centré */
#countdown-wrap{
  display:flex;flex-direction:column;align-items:center;gap:1px;
  background:linear-gradient(135deg,#eff6ff,#e0edff);
  border:1.5px solid #bfdbfe;border-radius:12px;padding:5px 20px;
}
#countdown-label{font-size:9px;font-weight:700;color:#3b6ef8;letter-spacing:.1em;text-transform:uppercase}
#countdown-time{font-size:22px;font-weight:900;color:#1d4ed8;letter-spacing:-.03em;line-height:1.1;font-variant-numeric:tabular-nums}
#countdown-time.urgent{color:#dc2626;animation:urgentPulse 1s ease-in-out infinite}
#countdown-time.done{color:#16a34a}

#header-right{display:flex;align-items:center;justify-content:flex-end;gap:10px}
#src-badge{font-size:10px;font-weight:600;color:#9ca3af;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:20px;padding:4px 12px}
#src-badge.live{color:#16a34a;background:#f0fdf4;border-color:#bbf7d0}

/* ── PROGRESS ── */
#progress-track{background:#e5e7eb;overflow:hidden;flex-shrink:0}
#progress-fill{height:100%;width:100%;background:linear-gradient(90deg,#3b6ef8,#7c3aed)}

/* ── KPIs ── */
#kpis{
  padding:10px 24px;
  display:flex;gap:10px;flex-shrink:0;
  background:#f0f2f7;
}
.kpi{flex:1;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:10px 14px;box-shadow:0 1px 3px rgba(0,0,0,.05);display:flex;flex-direction:column;gap:2px}
.kpi-lbl{font-size:9px;font-weight:600;color:#9ca3af;letter-spacing:.08em;text-transform:uppercase}
.kpi-val{font-size:22px;font-weight:900;color:#111827;letter-spacing:-.03em;line-height:1}
.kpi-sub{font-size:9px;color:#d1d5db;font-weight:500}

/* ── MAIN 2 COLONNES ── */
#main{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0;
  min-height:0;
  overflow:hidden;
}

/* colonne */
.col{
  display:flex;flex-direction:column;
  min-height:0;
  overflow:hidden;
}
.col:first-child{border-right:1px solid #e5e7eb}

/* titre colonne */
.col-header{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:10px 20px 8px;
  flex-shrink:0;
  background:#fff;
  border-bottom:1px solid #e5e7eb;
}
.col-title{font-size:15px;font-weight:800;letter-spacing:-.02em}
.col-count{font-size:11px;font-weight:700;border-radius:20px;padding:2px 10px}

/* scroll dans chaque colonne */
.col-scroll{
  flex:1;overflow-y:hidden;
  scrollbar-width:none;
  position:relative;
}
.col-scroll::-webkit-scrollbar{display:none}
.col-inner{
  display:flex;flex-direction:column;gap:9px;
  padding:10px 16px 12px;
  will-change:transform;
}

/* ── CARD ── */
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:14px;
  box-shadow:0 1px 6px rgba(0,0,0,.06);
  overflow:hidden;
  animation:fadeUp .3s ease both;
  flex-shrink:0;
  display:flex;flex-direction:column;
}
.card:hover{box-shadow:0 4px 14px rgba(0,0,0,.1)}
.card-strip{height:4px;width:100%;flex-shrink:0}
.card-content{padding:12px 14px 10px;display:flex;flex-direction:column;gap:8px}

/* top */
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-top-left{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.card-lead{font-size:14px;font-weight:800;color:#111827;letter-spacing:-.02em;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sales{font-size:10px;font-weight:600;display:flex;align-items:center;gap:3px}
.card-badge{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.05em;white-space:nowrap;flex-shrink:0}

/* MRR */
.card-mrr-box{border-radius:10px;padding:8px 12px;text-align:center;min-width:90px;flex-shrink:0}
.mrr-lbl{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.mrr-amount{font-size:17px;font-weight:900;letter-spacing:-.03em;line-height:1}
.mrr-unit{font-size:9px;font-weight:500;opacity:.6;margin-top:1px}

/* meta chips */
.card-meta{display:flex;gap:6px;flex-wrap:wrap}
.meta-chip{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:500;background:#f9fafb;border:1px solid #e5e7eb;border-radius:20px;padding:3px 9px;color:#6b7280}
.meta-chip .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* next step */
.card-next{display:flex;flex-direction:column;gap:4px;background:#f9fafb;border:1px solid #f3f4f6;border-radius:9px;padding:8px 10px}
.card-next-header{display:flex;align-items:center;justify-content:space-between;gap:6px}
.card-next-label{font-size:8px;font-weight:700;color:#9ca3af;letter-spacing:.08em;text-transform:uppercase}
.card-next-date{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px}
.card-next-text{font-size:11px;color:#374151;font-weight:500;line-height:1.4;font-style:italic}

/* comment */
.card-comment{font-size:10px;color:#6b7280;line-height:1.5;display:flex;gap:4px;padding-top:4px;border-top:1px solid #f3f4f6}

/* ── FOOTER ── */
#footer{
  background:#fff;border-top:1px solid #e5e7eb;
  padding:0 24px;display:flex;justify-content:space-between;align-items:center;
}
#footer span{font-size:9px;color:#d1d5db;font-weight:500}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes urgentPulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div id="header-left">
      <div id="logo-icon">⚡</div>
      <div>
        <div id="app-name">Sales Live Tracker</div>
        <div id="app-sub">Pipeline · Temps réel</div>
      </div>
    </div>

    <!-- COUNTDOWN CENTRÉ -->
    <div id="countdown-wrap">
      <span id="countdown-label">Fin de journée dans</span>
      <span id="countdown-time">--:--:--</span>
    </div>

    <div id="header-right">
      <span id="src-badge">⏳ Chargement…</span>
    </div>
  </div>

  <!-- PROGRESS -->
  <div id="progress-track"><div id="progress-fill"></div></div>

  <!-- KPIs -->
  <div id="kpis">
    <div class="kpi"><div class="kpi-lbl">🏥 Deals Hospi</div><div class="kpi-val" id="kpi-hospi" style="color:#3b6ef8">—</div><div class="kpi-sub">actifs</div></div>
    <div class="kpi"><div class="kpi-lbl">💊 MRR Hospi</div><div class="kpi-val" id="kpi-mrr-hospi" style="color:#3b6ef8">—</div><div class="kpi-sub">potentiel</div></div>
    <div class="kpi"><div class="kpi-lbl">🏢 Deals RSSL</div><div class="kpi-val" id="kpi-rssl" style="color:#7c3aed">—</div><div class="kpi-sub">actifs</div></div>
    <div class="kpi"><div class="kpi-lbl">💰 MRR RSSL</div><div class="kpi-val" id="kpi-mrr-rssl" style="color:#7c3aed">—</div><div class="kpi-sub">potentiel</div></div>
    <div class="kpi"><div class="kpi-lbl">🔥 Chauds total</div><div class="kpi-val" id="kpi-hot" style="color:#16a34a">—</div><div class="kpi-sub">≤ 2 jours</div></div>
    <div class="kpi"><div class="kpi-lbl">⚠️ À relancer</div><div class="kpi-val" id="kpi-risk" style="color:#dc2626">—</div><div class="kpi-sub">> 7 jours</div></div>
  </div>

  <!-- MAIN 2 COLONNES -->
  <div id="main">

    <!-- HOSPI (gauche, bleu) -->
    <div class="col">
      <div class="col-header" style="border-bottom:2px solid #3b6ef8">
        <span class="col-title" style="color:#3b6ef8">🏥 Équipe Hospi</span>
        <span class="col-count" id="col-cnt-hospi" style="background:#eff6ff;color:#3b6ef8">—</span>
      </div>
      <div class="col-scroll" id="col-hospi"></div>
    </div>

    <!-- RSSL (droite, violet) -->
    <div class="col">
      <div class="col-header" style="border-bottom:2px solid #7c3aed">
        <span class="col-title" style="color:#7c3aed">🏢 Équipe RSSL</span>
        <span class="col-count" id="col-cnt-rssl" style="background:#f5f3ff;color:#7c3aed">—</span>
      </div>
      <div class="col-scroll" id="col-rssl"></div>
    </div>

  </div>

  <!-- FOOTER -->
  <div id="footer">
    <span>Google Sheets · refresh 10s</span>
    <span id="ft-date"></span>
  </div>

</div>
<script>
const API_URL    = "/api/deals";
const REFRESH_MS = 10000;

const CFG = {
  Hospi: { accent:"#3b6ef8", mrrBg:"linear-gradient(135deg,#eff6ff,#e0edff)", mrrColor:"#1d4ed8", mrrBorder:"rgba(59,110,248,.2)" },
  RSSL:  { accent:"#7c3aed", mrrBg:"linear-gradient(135deg,#f5f3ff,#ede9fe)", mrrColor:"#5b21b6", mrrBorder:"rgba(124,58,237,.2)" },
};

const FALLBACK = {
  Hospi:[
    {id:1,salesName:"Claire Vidal",  leadName:"CHU Bordeaux",          lastActivity:"2025-03-18",nextStep:"Call découverte #2",    nextStepDate:"2025-03-22",forecastClose:"2025-04-15",comment:"Fort intérêt module urgences.",mrr:9900},
    {id:2,salesName:"Pierre Simon",  leadName:"Hôpital Privé du Sud",  lastActivity:"2025-03-12",nextStep:"Présentation ROI",      nextStepDate:"2025-03-25",forecastClose:"2025-04-01",comment:"Concurrent en lice. Atout : onboarding.",mrr:6700},
    {id:3,salesName:"Laura Michel",  leadName:"AP-HP Lariboisière",    lastActivity:"2025-03-03",nextStep:"Escalade sponsor exec", nextStepDate:"2025-03-21",forecastClose:"2025-04-30",comment:"Bloqué 16j. Champion interne à remotiver.",mrr:14200},
    {id:4,salesName:"Romain Garnier",leadName:"Clinique de l'Europe",  lastActivity:"2025-03-19",nextStep:"Pilote 30j lancé",      nextStepDate:"2025-03-20",forecastClose:"2025-04-18",comment:"Très bon démarrage.",mrr:3800},
    {id:5,salesName:"Nina Rousseau", leadName:"GHT Normandie",         lastActivity:"2025-03-16",nextStep:"Réponse appel d'offres",nextStepDate:"2025-03-28",forecastClose:"2025-05-01",comment:"AO public. Offre compétitive.",mrr:18500},
  ],
  RSSL:[
    {id:6,salesName:"Marie Dupont",  leadName:"Clinique du Parc",      lastActivity:"2025-03-18",nextStep:"Démo produit finale",       nextStepDate:"2025-03-25",forecastClose:"2025-03-28",comment:"Budget validé. Attente GO direction.",mrr:4800},
    {id:7,salesName:"Thomas Leroy",  leadName:"CH Métropole Nord",     lastActivity:"2025-03-17",nextStep:"Envoi proposition tarifaire",nextStepDate:"2025-03-22",forecastClose:"2025-04-05",comment:"3 décideurs impliqués.",mrr:12500},
    {id:8,salesName:"Sophie Martin", leadName:"Polyclinique Lumière",  lastActivity:"2025-03-10",nextStep:"Relance urgente",            nextStepDate:"2025-03-20",forecastClose:"2025-04-12",comment:"Contact silencieux.",mrr:3200},
    {id:9,salesName:"Marc Petit",    leadName:"GCS Île-de-France",     lastActivity:"2025-03-06",nextStep:"RDV de requalification",     nextStepDate:"2025-03-28",forecastClose:"2025-04-20",comment:"Budget gelé Q1.",mrr:7600},
    {id:10,salesName:"Julie Bernard",leadName:"Clinique Saint-Joseph", lastActivity:"2025-03-19",nextStep:"Négociation contrat final",  nextStepDate:"2025-03-21",forecastClose:"2025-03-25",comment:"Dernières conditions.",mrr:21000},
  ],
};

let teamData = JSON.parse(JSON.stringify(FALLBACK));
let scrollPos = {Hospi:0, RSSL:0};
let scrollDir = {Hospi:1, RSSL:1};
let scrollRafs = {};

// ── UTILS ──────────────────────────────────────────────────────
const TODAY = new Date();
function daysSince(d){if(!d)return 99;const dt=new Date(d);return isNaN(dt)?99:Math.max(0,Math.floor((TODAY-dt)/86400000))}
function daysUntil(d){if(!d)return 99;const dt=new Date(d);return isNaN(dt)?99:Math.floor((dt-TODAY)/86400000)}

function actBadge(days){
  if(days<=2)return{bg:"#dcfce7",color:"#15803d",border:"#bbf7d0",label:days===0?"Auj.":days===1?"Hier":`${days}j`};
  if(days<=7)return{bg:"#fef3c7",color:"#b45309",border:"#fde68a",label:`${days}j`};
  return          {bg:"#fee2e2",color:"#b91c1c",border:"#fecaca",label:`${days}j`};
}
function closeStyle(d){
  const n=daysUntil(d);
  if(n<=7) return{bg:"#fee2e2",color:"#b91c1c",border:"#fecaca",dot:"#dc2626"};
  if(n<=14)return{bg:"#fef3c7",color:"#b45309",border:"#fde68a",dot:"#d97706"};
  return        {bg:"#f3f4f6",color:"#6b7280", border:"#e5e7eb",dot:"#9ca3af"};
}
function nextStepStyle(d){
  const n=daysUntil(d);
  if(n<0)  return{bg:"#fee2e2",color:"#b91c1c",border:"#fecaca"};
  if(n<=2) return{bg:"#fee2e2",color:"#b91c1c",border:"#fecaca"};
  if(n<=7) return{bg:"#fef3c7",color:"#b45309",border:"#fde68a"};
  return        {bg:"#f0fdf4",color:"#15803d", border:"#bbf7d0"};
}
function fmtD(s){if(!s)return"—";const d=new Date(s);return isNaN(d)?s:d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})}
function fmtMRR(n){if(!n&&n!==0)return"—";return n.toLocaleString("fr-FR")}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

// ── RENDER COLUMN ──────────────────────────────────────────────
function renderCol(team, containerId, countId) {
  const deals = teamData[team] || [];
  const cfg   = CFG[team];

  document.getElementById(countId).textContent = deals.length;

  const area = document.getElementById(containerId);
  area.innerHTML = "";

  if (!deals.length) {
    area.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;color:#9ca3af;font-size:13px;padding:30px 0">Aucun deal.</div>`;
    return;
  }

  // Create inner wrapper for infinite scroll
  const inner = document.createElement("div");
  inner.className = "col-inner";

  deals.forEach((deal, i) => {
    const days = daysSince(deal.lastActivity);
    const ab   = actBadge(days);
    const cs   = closeStyle(deal.forecastClose);
    const ns   = nextStepStyle(deal.nextStepDate);

    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = `${i * 40}ms`;

    card.innerHTML = `
      <div class="card-strip" style="background:${cfg.accent}"></div>
      <div class="card-content">

        <div class="card-top">
          <div class="card-top-left">
            <div class="card-lead">${esc(deal.leadName)}</div>
            ${deal.salesName ? `<div class="card-sales" style="color:${cfg.accent}">👤 ${esc(deal.salesName)}</div>` : ""}
          </div>
          <span class="card-badge" style="background:${ab.bg};color:${ab.color};border:1px solid ${ab.border}">⏱ ${ab.label}</span>
          <div class="card-mrr-box" style="background:${cfg.mrrBg};border:1px solid ${cfg.mrrBorder}">
            <div class="mrr-lbl" style="color:${cfg.mrrColor}">MRR</div>
            <div class="mrr-amount" style="color:${cfg.mrrColor}">${fmtMRR(deal.mrr)}</div>
            ${deal.mrr ? `<div class="mrr-unit" style="color:${cfg.mrrColor}">€/mois</div>` : ""}
          </div>
        </div>

        <div class="card-meta">
          <div class="meta-chip">📞 <span style="color:#374151;font-weight:600">${fmtD(deal.lastActivity)}</span></div>
          <div class="meta-chip" style="background:${cs.bg};border-color:${cs.border};color:${cs.color}">
            <span class="dot" style="background:${cs.dot}"></span>
            Closing <strong>${fmtD(deal.forecastClose)}</strong>
          </div>
        </div>

        <div class="card-next">
          <div class="card-next-header">
            <span class="card-next-label">Prochaine étape</span>
            ${deal.nextStepDate ? `<span class="card-next-date" style="background:${ns.bg};color:${ns.color};border:1px solid ${ns.border}">📅 ${fmtD(deal.nextStepDate)}</span>` : ""}
          </div>
          <div class="card-next-text">› ${esc(deal.nextStep)}</div>
        </div>

        ${deal.comment ? `<div class="card-comment"><span>💬</span><span>${esc(deal.comment)}</span></div>` : ""}

      </div>
    `;
    inner.appendChild(card);
  });
  area.appendChild(inner);
}

// ── RENDER ALL ─────────────────────────────────────────────────
function render() {
  renderCol("Hospi", "col-hospi", "col-cnt-hospi");
  renderCol("RSSL",  "col-rssl",  "col-cnt-rssl");
  // Restart infinite scrolls after re-render
  requestAnimationFrame(() => {
    startScroll("col-hospi", "Hospi");
    startScroll("col-rssl",  "RSSL");
  });

  const allDeals  = [...(teamData.Hospi||[]), ...(teamData.RSSL||[])];
  const hospiDeals = teamData.Hospi||[];
  const rsslDeals  = teamData.RSSL||[];

  document.getElementById("kpi-hospi").textContent    = hospiDeals.length;
  document.getElementById("kpi-mrr-hospi").textContent= hospiDeals.reduce((s,d)=>s+(d.mrr||0),0).toLocaleString("fr-FR")+" €";
  document.getElementById("kpi-rssl").textContent     = rsslDeals.length;
  document.getElementById("kpi-mrr-rssl").textContent = rsslDeals.reduce((s,d)=>s+(d.mrr||0),0).toLocaleString("fr-FR")+" €";
  document.getElementById("kpi-hot").textContent      = allDeals.filter(d=>daysSince(d.lastActivity)<=2).length;
  document.getElementById("kpi-risk").textContent     = allDeals.filter(d=>daysSince(d.lastActivity)>7).length;
}

// ── FETCH ──────────────────────────────────────────────────────
async function loadSheet() {
  try {
    const r = await fetch(API_URL + "?t=" + Date.now());
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    if (!data.Hospi && !data.RSSL) throw new Error("empty");
    teamData = {
      Hospi: (data.Hospi && data.Hospi.length) ? data.Hospi : FALLBACK.Hospi,
      RSSL:  (data.RSSL  && data.RSSL.length)  ? data.RSSL  : FALLBACK.RSSL,
    };
    const badge = document.getElementById("src-badge");
    badge.className = "live";
    badge.textContent = "📡 LIVE · " + new Date().toLocaleTimeString("fr-FR");
  } catch(e) {
    teamData = JSON.parse(JSON.stringify(FALLBACK));
    const badge = document.getElementById("src-badge");
    badge.className = "";
    badge.textContent = "⚠️ Démo";
  }
  render();
}

// ── AUTO SCROLL INFINI par colonne ────────────────────────────
function startScroll(colId, team) {
  cancelAnimationFrame(scrollRafs[team]);
  const outer = document.getElementById(colId);

  // Ensure inner wrapper exists
  let inner = outer.querySelector(".col-inner");
  if (!inner) return;

  // Clone all cards and append for seamless loop
  const origCards = Array.from(inner.children);
  if (origCards.length === 0) return;

  // Remove previous clones
  outer.querySelectorAll(".col-clone").forEach(c => c.remove());
  const clone = inner.cloneNode(true);
  clone.classList.add("col-clone");
  clone.style.padding = "0 16px 12px";
  outer.appendChild(clone);

  // Position inner absolutely for smooth transform scroll
  inner.style.position = "absolute";
  inner.style.top = "0";
  inner.style.left = "0";
  inner.style.right = "0";
  clone.style.position = "absolute";
  clone.style.left = "0";
  clone.style.right = "0";

  // Wait for paint to measure height
  requestAnimationFrame(() => {
    const h = inner.offsetHeight + 9; // +gap
    clone.style.top = h + "px";
    outer.style.height = "";

    let pos = 0;
    const speed = 0.5;

    (function tick() {
      pos += speed;
      if (pos >= h) pos -= h;
      inner.style.transform = `translateY(-${pos}px)`;
      clone.style.transform = `translateY(-${pos}px)`;
      scrollRafs[team] = requestAnimationFrame(tick);
    })();
  });
}

// ── COUNTDOWN ─────────────────────────────────────────────────
function updateCountdown() {
  const now    = new Date();
  const target = new Date(); target.setHours(18, 30, 0, 0);
  const el     = document.getElementById("countdown-time");
  const wrap   = document.getElementById("countdown-wrap");
  const lbl    = document.getElementById("countdown-label");

  if (now >= target) {
    el.textContent = "C'est l'heure ! 🎉"; el.className = "done";
    wrap.style.background = "linear-gradient(135deg,#f0fdf4,#dcfce7)";
    wrap.style.borderColor = "#bbf7d0"; lbl.style.color = "#16a34a";
    return;
  }
  const diff = target - now;
  const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
  el.textContent = `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  if (diff < 30*60*1000) {
    el.className = "urgent";
    wrap.style.background = "linear-gradient(135deg,#fff1f2,#fee2e2)"; wrap.style.borderColor = "#fecaca"; lbl.style.color = "#dc2626";
  } else {
    el.className = "";
    wrap.style.background = "linear-gradient(135deg,#eff6ff,#e0edff)"; wrap.style.borderColor = "#bfdbfe"; lbl.style.color = "#3b6ef8";
  }
}

// ── INIT ───────────────────────────────────────────────────────
document.getElementById("ft-date").textContent =
  new Date().toLocaleDateString("fr-FR", {weekday:"long", day:"numeric", month:"long", year:"numeric"});

setInterval(updateCountdown, 1000); updateCountdown();
render();
loadSheet();
setInterval(loadSheet, REFRESH_MS);
</script>
</body>
</html>
