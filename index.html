<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>Sales Live Tracker - Skello</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#f0f2f7}
body{font-family:"Inter",sans-serif;color:#111827}
#app{height:100vh;display:flex;flex-direction:column}

/* HEADER */
#header{background:#fff;border-bottom:1px solid #e5e7eb;height:56px;flex-shrink:0;padding:0 24px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center}
#hl{display:flex;align-items:center;gap:12px}
#hl img{height:26px;width:auto}
#app-name{font-size:15px;font-weight:800;color:#111827;letter-spacing:-.02em}
#app-sub{font-size:10px;color:#9ca3af;font-weight:500}
#cdown{display:flex;flex-direction:column;align-items:center;background:linear-gradient(135deg,#eff6ff,#e0edff);border:1.5px solid #bfdbfe;border-radius:12px;padding:4px 18px}
#clbl{font-size:8px;font-weight:700;color:#3b6ef8;letter-spacing:.1em;text-transform:uppercase}
#ctime{font-size:20px;font-weight:900;color:#1d4ed8;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
#ctime.urgent{color:#dc2626;animation:blink 1s infinite}
#ctime.done{color:#16a34a}
#hr{display:flex;justify-content:flex-end;align-items:center}
#sbadge{font-size:10px;font-weight:600;color:#9ca3af;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:20px;padding:4px 12px}
#sbadge.live{color:#16a34a;background:#f0fdf4;border-color:#bbf7d0}

/* KPIS */
#kpis{flex-shrink:0;padding:8px 24px;display:flex;gap:10px;background:#f0f2f7}
.kpi{flex:1;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:9px 13px;box-shadow:0 1px 3px rgba(0,0,0,.05);display:flex;flex-direction:column;gap:3px}
.kpi.h{border-top:3px solid #3b6ef8}
.kpi.r{border-top:3px solid #7c3aed}
.kl{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#6b7280}
.kv{font-size:19px;font-weight:900;letter-spacing:-.02em;line-height:1}
.kb{height:5px;background:#f3f4f6;border-radius:10px;overflow:hidden;margin-top:2px}
.kbf{height:100%;border-radius:10px;transition:width .8s ease;width:0%}
.ks{font-size:9px;color:#9ca3af;display:flex;justify-content:space-between}

/* MAIN */
#main{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0;overflow:hidden}
.col{display:flex;flex-direction:column;min-height:0}
.col:first-child{border-right:1px solid #e5e7eb}
.col-head{flex-shrink:0;background:#fff;border-bottom:2px solid;padding:8px 20px;display:flex;align-items:center;justify-content:center;gap:8px}
.ct{font-size:14px;font-weight:800;letter-spacing:-.02em}
.cc{font-size:11px;font-weight:700;border-radius:20px;padding:2px 10px}

/* SCROLL ZONE */
.col-scroll{flex:1;overflow:hidden;position:relative;min-height:0}

/* Le ticker — animation CSS pure */
.ticker{
  position:absolute;
  left:16px;right:16px;
  top:0;
  /* la durée sera définie inline via JS */
  animation-name:scrollUp;
  animation-timing-function:linear;
  animation-iteration-count:infinite;
  animation-play-state:running;
}
@keyframes scrollUp{
  0%   { transform: translateY(0); }
  100% { transform: translateY(var(--scroll-h)); }
}

/* CARD */
.card{background:#fff;border:1px solid #e5e7eb;border-radius:13px;box-shadow:0 1px 5px rgba(0,0,0,.06);overflow:hidden;flex-shrink:0;display:flex;flex-direction:column;margin-bottom:9px}
.cs{height:4px;width:100%;flex-shrink:0}
.ci{padding:11px 13px 9px;display:flex;flex-direction:column;gap:7px}
.ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.ctl{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.cl{font-size:14px;font-weight:800;color:#111827;letter-spacing:-.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.csl{font-size:10px;font-weight:600}
.badge{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.04em;white-space:nowrap;flex-shrink:0}
.mbox{border-radius:10px;padding:7px 11px;text-align:center;min-width:88px;flex-shrink:0}
.ml{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.mv{font-size:16px;font-weight:900;letter-spacing:-.03em;line-height:1}
.mu{font-size:9px;opacity:.6;margin-top:1px}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:3px;font-size:10px;font-weight:500;background:#f9fafb;border:1px solid #e5e7eb;border-radius:20px;padding:3px 9px;color:#6b7280}
.cdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.clbl2{font-size:8px;color:#9ca3af;font-weight:600;text-transform:uppercase;margin-right:2px}
.nxt{background:#f9fafb;border:1px solid #f3f4f6;border-radius:9px;padding:7px 10px;display:flex;flex-direction:column;gap:3px}
.nh{display:flex;align-items:center;justify-content:space-between}
.nl{font-size:8px;font-weight:700;color:#9ca3af;letter-spacing:.08em;text-transform:uppercase}
.nd{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px}
.nt{font-size:11px;color:#374151;font-weight:500;font-style:italic;line-height:1.4}
.cmt{font-size:10px;color:#6b7280;line-height:1.5;display:flex;gap:4px;padding-top:4px;border-top:1px solid #f3f4f6}
.cmtl{font-size:8px;font-weight:700;color:#9ca3af;text-transform:uppercase;flex-shrink:0;padding-top:1px}

/* FOOTER */
#footer{flex-shrink:0;background:#fff;border-top:1px solid #e5e7eb;height:26px;padding:0 24px;display:flex;justify-content:space-between;align-items:center}
#footer span{font-size:9px;color:#d1d5db;font-weight:500}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>

  return        {bg:"#f3f4f6",c:"#6b7280", b:"#e5e7eb",dot:"#9ca3af"};
}
function nsS(d){
  const n=daysUntil(d);
  if(n<0) return{bg:"#fee2e2",c:"#b91c1c",b:"#fecaca"};
  if(n<=2)return{bg:"#fee2e2",c:"#b91c1c",b:"#fecaca"};
  if(n<=7)return{bg:"#fef3c7",c:"#b45309",b:"#fde68a"};
  return       {bg:"#f0fdf4",c:"#15803d",b:"#bbf7d0"};
}

// ── MAKE CARD ──────────────────────────────────────────────────
function makeCard(deal, cfg){
  const days=daysSince(deal.lastActivity);
  const ab=actB(days), cs=csS(deal.forecastClose), ns=nsS(deal.nextStepDate);
  const d=document.createElement("div");
  d.className="card";
  d.innerHTML=
    '<div class="cs" style="background:'+cfg.accent+'"></div>'+
    '<div class="ci">'+
      '<div class="ctop">'+
        '<div class="ctl">'+
          '<div class="cl">'+esc(deal.leadName)+'</div>'+
          (deal.salesName?'<div class="csl" style="color:'+cfg.accent+'">👤 '+esc(deal.salesName)+'</div>':'')+
        '</div>'+
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">'+
          '<span class="badge" style="background:'+ab.bg+';color:'+ab.c+';border:1px solid '+ab.b+'">⏱ '+ab.l+'</span>'+
          (deal.state==="closed"?'<span class="badge" style="background:#dcfce7;color:#15803d;border:1px solid #bbf7d0">✅ Closé</span>':'')+
        '</div>'+
        '<div class="mbox" style="background:'+cfg.mrrBg+';border:1px solid '+cfg.mrrBorder+'">'+
          '<div class="ml" style="color:'+cfg.mrrColor+'">MRR</div>'+
          '<div class="mv" style="color:'+cfg.mrrColor+'">'+fmtM(deal.mrr)+'</div>'+
          (deal.mrr?'<div class="mu" style="color:'+cfg.mrrColor+'">€/mois</div>':'')+
        '</div>'+
      '</div>'+
      '<div class="chips">'+
        '<div class="chip"><span class="clbl2">Last activity</span>📞<span style="color:#374151;font-weight:600;margin-left:3px">'+fmtD(deal.lastActivity)+'</span></div>'+
        '<div class="chip" style="background:'+cs.bg+';border-color:'+cs.b+';color:'+cs.c+'">'+
          '<span class="cdot" style="background:'+cs.dot+'"></span>'+
          '<span class="clbl2">Closing</span><strong>'+fmtD(deal.forecastClose)+'</strong>'+
        '</div>'+
      '</div>'+
      '<div class="nxt">'+
        '<div class="nh">'+
          '<span class="nl">🎯 Next Step</span>'+
          (deal.nextStepDate?'<span class="nd" style="background:'+ns.bg+';color:'+ns.c+';border:1px solid '+ns.b+'">📅 '+fmtD(deal.nextStepDate)+'</span>':'')+
        '</div>'+
        '<div class="nt">› '+esc(deal.nextStep)+'</div>'+
      '</div>'+
      (deal.comment?'<div class="cmt"><span class="cmtl">Note</span><span>💬 '+esc(deal.comment)+'</span></div>':'')+
    '</div>';
  return d;
}

// ── INFINITE SCROLL — CSS animation ───────────────────────────
// Principe : on duplique les cartes (A+B), on anime avec CSS translateY
// Quand A sort par le haut, B prend le relais, et on recrée A en dessous → boucle infinie
// Le refresh met à jour les cartes sans toucher à l'animation en cours

const tickers = {};

function buildTicker(scrollId, team){
  const zone = document.getElementById(scrollId);
  if(!zone) return;

  const deals = (liveData || FB)[team] || [];
  const cfg   = CFG[team];

  // Si un ticker existe déjà, on met juste à jour les cartes sans recréer l'animation
  if(tickers[team] && tickers[team].running){
    updateTickerCards(team, deals, cfg);
    return;
  }

  // Première construction
  zone.innerHTML = "";
  if(!deals.length){
    zone.innerHTML = '<div style="padding:30px;text-align:center;color:#9ca3af">Aucun deal</div>';
    return;
  }

  // Wrapper
  const wrap = document.createElement("div");
  wrap.style.cssText = "position:relative;height:100%";
  zone.appendChild(wrap);

  // Crée les cartes
  function buildCards(){
    const frag = document.createDocumentFragment();
    deals.forEach(d => frag.appendChild(makeCard(d, cfg)));
    return frag;
  }

  // Conteneur A
  const divA = document.createElement("div");
  divA.style.cssText = "position:absolute;left:0;right:0;padding:10px 0 0";
  divA.appendChild(buildCards());
  wrap.appendChild(divA);

  // Attend le rendu pour mesurer
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const h = divA.offsetHeight + 12;
    if(h <= 12) return;

    // Conteneur B = clone placé juste après A
    const divB = document.createElement("div");
    divB.style.cssText = "position:absolute;left:0;right:0;padding:10px 0 0";
    divB.style.top = h + "px";
    divB.appendChild(buildCards());
    wrap.appendChild(divB);

    // Durée = h px / SPEED px/s
    const duration = (h / SPEED).toFixed(2);

    // Injecte le keyframe dynamique avec la bonne hauteur
    const styleId = "ks-" + team;
    let styleEl = document.getElementById(styleId);
    if(!styleEl){ styleEl = document.createElement("style"); styleEl.id = styleId; document.head.appendChild(styleEl); }
    styleEl.textContent =
      '@keyframes scroll'+team+'{'+
      '0%{transform:translateY(0)}'+
      '100%{transform:translateY(-'+h+'px)}'+
      '}';

    // Applique l'animation CSS — infinie, linéaire
    const anim = 'scroll'+team+' '+duration+'s linear infinite';
    divA.style.animation = anim;
    divB.style.animation = anim;

    tickers[team] = { running:true, wrap, divA, divB, h, cfg, zone };
  }));
}

function updateTickerCards(team, deals, cfg){
  // Met à jour les cartes sans toucher à l'animation
  const t = tickers[team];
  if(!t) return;
  [t.divA, t.divB].forEach(div => {
    div.innerHTML = "";
    div.style.padding = "10px 0 0";
    deals.forEach(d => div.appendChild(makeCard(d, cfg)));
  });
}

// ── RENDER KPIs ────────────────────────────────────────────────
function renderKPIs(){
  const d = liveData || FB;
  const all = [...(d.Hospi||[]), ...(d.RSSL||[])];

  function setKpi(vid, bid, sid, pid, val, obj){
    const pct = obj > 0 ? Math.min(100, Math.round(val/obj*100)) : 0;
    const fmt = n => n > 0 ? n.toLocaleString("fr-FR")+" €" : "0 €";
    document.getElementById(vid).textContent = fmt(val);
    const b = document.getElementById(bid); if(b) b.style.width = pct+"%";
    const s = document.getElementById(sid); if(s) s.textContent = obj ? "obj. "+obj.toLocaleString("fr-FR")+" €" : "";
    const p = document.getElementById(pid); if(p) p.textContent = obj ? pct+"%" : "";
  }

  setKpi("kv-ph","kb-ph","ks-ph","kp-ph", mrrPrev.Hospi,   objs.Hospi);
  setKpi("kv-ah","kb-ah","ks-ah","kp-ah", mrrClosed.Hospi, objs.Hospi);
  setKpi("kv-pr","kb-pr","ks-pr","kp-pr", mrrPrev.RSSL,    objs.RSSL);
  setKpi("kv-ar","kb-ar","ks-ar","kp-ar", mrrClosed.RSSL,  objs.RSSL);

  // Closés ce mois
  const closedAll = all.filter(x => x.state === "closed");
  const mrrCM = closedAll.reduce((s,x)=>s+(x.mrr||0),0);
  document.getElementById("kv-cm").textContent   = closedAll.length;
  document.getElementById("ks-cm").textContent   = mrrCM > 0 ? mrrCM.toLocaleString("fr-FR")+" € MRR" : "";

  // À relancer
  document.getElementById("kv-risk").textContent = all.filter(x=>daysSince(x.lastActivity)>7).length;

  // Counts
  document.getElementById("cnt-h").textContent = (d.Hospi||[]).length;
  document.getElementById("cnt-r").textContent = (d.RSSL ||[]).length;
}

// ── FETCH ──────────────────────────────────────────────────────
async function loadSheet(){
  try{
    const r = await fetch(API+"?t="+Date.now());
    if(!r.ok) throw new Error(r.status);
    const d = await r.json();
    if(!d||(!d.Hospi&&!d.RSSL)) throw new Error("empty");

    liveData = {
      Hospi: (d.Hospi&&d.Hospi.length) ? d.Hospi : FB.Hospi,
      RSSL:  (d.RSSL &&d.RSSL.length)  ? d.RSSL  : FB.RSSL,
    };
    objs      = {Hospi:d.objectifHospi||null,       RSSL:d.objectifRSSL||null};
    mrrClosed = {Hospi:d.mrrClosedHospi||0,         RSSL:d.mrrClosedRSSL||0};
    mrrPrev   = {Hospi:d.mrrPrevisionnelHospi||0,   RSSL:d.mrrPrevisionnelRSSL||0};

    const b = document.getElementById("sbadge");
    b.className = "live";
    b.textContent = "📡 LIVE · "+new Date().toLocaleTimeString("fr-FR");
  }catch(e){
    liveData = JSON.parse(JSON.stringify(FB));
    const b = document.getElementById("sbadge");
    b.className = "";
    b.textContent = "⚠️ Démo";
  }
  renderKPIs();
  buildTicker("scroll-h","Hospi");
  buildTicker("scroll-r","RSSL");
}

// ── COUNTDOWN ──────────────────────────────────────────────────
function tickClock(){
  const n=new Date(), t=new Date(); t.setHours(18,30,0,0);
  const el=document.getElementById("ctime");
  const wrap=document.getElementById("cdown");
  const lbl=document.getElementById("clbl");
  if(n>=t){
    el.textContent="C'est l'heure ! 🎉";el.className="done";
    wrap.style.background="linear-gradient(135deg,#f0fdf4,#dcfce7)";wrap.style.borderColor="#bbf7d0";lbl.style.color="#16a34a";
    return;
  }
  const diff=t-n;
  const h=Math.floor(diff/3600000),m=Math.floor(diff%3600000/60000),s=Math.floor(diff%60000/1000);
  el.textContent=String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
  if(diff<1800000){
    el.className="urgent";wrap.style.background="linear-gradient(135deg,#fff1f2,#fee2e2)";wrap.style.borderColor="#fecaca";lbl.style.color="#dc2626";
  }else{
    el.className="";wrap.style.background="linear-gradient(135deg,#eff6ff,#e0edff)";wrap.style.borderColor="#bfdbfe";lbl.style.color="#3b6ef8";
  }
}

// ── INIT ───────────────────────────────────────────────────────
document.getElementById("ftd").textContent =
  new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

setInterval(tickClock, 1000); tickClock();
loadSheet();
setInterval(loadSheet, REFRESH);
</script>
